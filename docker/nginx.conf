server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # ── ES-Module: korrekte MIME-Types ──────────────────────────────────────
    types {
        application/javascript  js mjs;
        text/css                css;
        text/html               html htm;
        application/json        json;
        image/png               png;
        image/jpeg              jpg jpeg;
        image/svg+xml           svg;
        image/x-icon            ico;
        font/woff2              woff2;
        text/plain              txt md;
    }

    # ── Security-Header ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options "nosniff"                             always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml text/markdown;
    gzip_min_length 1024;
    gzip_vary on;

    # ── SPA-Routing ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── HTML: immer revalidieren (kein stale nach Deployment) ───────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        access_log off;
    }

    # ── JSON-Modelldaten: kurze TTL, kein immutable ──────────────────────────
    # models.json und data/*.json können sich bei Konfigurationsänderungen ändern
    location ~* \.json$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ── JS + CSS: stündlich revalidieren ────────────────────────────────────
    # Kein "immutable" – Dateinamen tragen keine Content-Hashes,
    # daher kann sich der Inhalt bei einem neuen Image ändern.
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ── Statische Assets: langfristig cachen ────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
