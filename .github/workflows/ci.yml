name: CI – Tests & Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "vitest.config.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]

jobs:

  # ── Frontend: Vitest ──────────────────────────────────────────────────────
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 24 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: npm-Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Tests + Coverage
        run: npm run test:coverage

      - name: Coverage-Artefakt hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: coverage/
          retention-days: 14

  # ── Docker: Build-Test ────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Docker Image bauen
        run: |
          docker build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VCS_REF="${GITHUB_SHA::8}" \
            -t nagvis3d:ci .

      - name: Container-Healthcheck
        run: |
          docker run -d --name nv3d-test -p 8090:80 nagvis3d:ci
          sleep 5
          curl -sf http://localhost:8090/index.html || exit 1

      - name: Container aufräumen
        if: always()
        run: docker rm -f nv3d-test 2>/dev/null || true
